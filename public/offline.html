<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - SimpleAkunting</title>
  <link rel="icon" href="/img/icon-512.png">
  <style>
    body { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f8fafc; color:#0f172a; }
    .card { text-align:center; padding:2rem; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.08); max-width:420px; }
    h1 { margin:0 0 .5rem; font-size:1.5rem; }
    p { margin:0 0 1rem; color:#475569 }
    a.btn { display:inline-block; padding:.5rem 1rem; background:#059669; color:#fff; border-radius:8px; text-decoration:none }
  </style>
</head>
<body>
  <div class="card">
    <img src="/img/icon-512.png" alt="icon" width="72" style="margin-bottom:1rem">
    <h1>Anda sedang offline</h1>
    <p>Aplikasi tidak dapat terhubung ke server. Beberapa fitur mungkin tidak tersedia.</p>
    <a class="btn" href="/login">Buka Kembali Aplikasi</a>
  </div>
</body>
</html>
